function groupByDate(files){
  const grouped = {};

  files.forEach(f=>{
    const m = f.match(/_(\d{8})\.html$/);
    if(!m) return;
    const date = m[1];
    if(!grouped[date]) grouped[date]=[];
    grouped[date].push(f);
  });

  return grouped;
}

function render(){
  const grouped = groupByDate(files);
  const dates = Object.keys(grouped).sort().reverse();

  let html = "";

  dates.forEach(date=>{
    html += `<div class="date-block">`;
    html += `<div class="date-title">${date}</div>`;
    html += `<div class="track-grid">`;

    grouped[date].sort().forEach(file=>{
      const track = file.split("_")[1];
      html += `<a href="${file}" target="_blank">${track}</a>`;
    });

    html += `</div></div>`;
  });

  document.getElementById("app").innerHTML = html;
}
